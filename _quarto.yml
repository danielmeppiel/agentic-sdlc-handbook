project:
  type: book
  output-dir: _book
  pre-render: scripts/stamp-version.sh

book:
  title: "The Agentic SDLC Handbook"
  subtitle: "A Guide to AI-Native Software Development for Leaders and Practitioners"
  author: "Daniel Meppiel"
  favicon: favicon.ico
  site-url: "https://danielmeppiel.github.io/agentic-sdlc-handbook/"
  repo-url: "https://github.com/danielmeppiel/agentic-sdlc-handbook"
  repo-actions: [issue]
  sharing: [twitter, linkedin]
  reader-mode: true
  chapters:
    - index.qmd
    - download.qmd
    - part: "Part I: The Foundation"
      chapters:
        - handbook/ch01-the-agentic-sdlc-thesis.qmd
    - part: "Part II: For Leaders"
      chapters:
        - handbook/ch02-the-ai-native-landscape.qmd
        - handbook/ch03-the-business-case.qmd
        - handbook/ch04-the-reference-architecture.qmd
        - handbook/ch05-governance-for-ai-assisted-delivery.qmd
        - handbook/ch06-team-structures.qmd
        - handbook/ch07-planning-the-transition.qmd
    - part: "Part III: For Practitioners"
      chapters:
        - handbook/ch08-the-practitioners-mindset.qmd
        - handbook/ch09-the-runtime-machine.qmd
        - handbook/ch10-the-instrumented-codebase.qmd
        - handbook/ch11-the-prose-specification.qmd
        - handbook/ch12-the-load-lifecycle.qmd
        - handbook/ch13-attention-and-context-economy.qmd
        - handbook/ch14-deterministic-probabilistic-boundary.qmd
        - handbook/ch15-multi-agent-orchestration.qmd
        - handbook/ch16-the-execution-meta-process.qmd
        - handbook/ch17-architectural-patterns-rosetta-stone.qmd
        - handbook/ch18-anti-patterns-and-failure-modes.qmd
        - handbook/ch19-primitives-as-code.qmd
    - part: "Part IV: Case Studies"
      chapters:
        - case-study-apm-overhaul.qmd
        - case-study-handbook-writing.qmd
        - case-study-publishing-pipeline.qmd
        - case-study-growth-engine.qmd
    - part: "Closing"
      chapters:
        - handbook/ch20-what-comes-next.qmd
        - handbook/appendix-a-cross-harness-reference.qmd

format:
  html:
    css:
      - styles/handbook-cover.css
    include-in-header:
      - text: |
          <link rel="icon" type="image/svg+xml" href="/agentic-sdlc-handbook/favicon.svg">
          <link rel="apple-touch-icon" href="/agentic-sdlc-handbook/apple-touch-icon.png">
          <meta name="dc.rights" content="CC BY-NC-ND 4.0">
          <meta name="dc.rights.uri" content="https://creativecommons.org/licenses/by-nc-nd/4.0/">
          <link rel="license" href="https://creativecommons.org/licenses/by-nc-nd/4.0/">
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-2DPKEV68VR"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-2DPKEV68VR');
          </script>
          <style>
            /* Mermaid diagram readability — light mode */
            :root {
              --mermaid-node-bg-color: #f0f4f8 !important;
              --mermaid-node-fg-color: #1a202c !important;
              --mermaid-label-fg-color: #1a202c !important;
              --mermaid-label-bg-color: #ffffff !important;
              --mermaid-fg-color: #1a202c !important;
              --mermaid-edge-color: #718096 !important;
            }
            /* Mermaid diagram readability — dark mode */
            body.quarto-dark {
              --mermaid-bg-color: transparent !important;
              --mermaid-node-bg-color: #2d3748 !important;
              --mermaid-node-fg-color: #e2e8f0 !important;
              --mermaid-label-fg-color: #e2e8f0 !important;
              --mermaid-label-bg-color: #1a202c !important;
              --mermaid-fg-color: #e2e8f0 !important;
              --mermaid-edge-color: #a0aec0 !important;
            }
          </style>
    include-after-body:
      - text: |
          <div style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 2rem; margin-top: 3rem; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
            <p style="color: #e0e0e0; margin: 0 0 0.5rem 0; font-size: 1.1rem; font-weight: 600;">📕 Get the PDF &amp; EPUB — free download</p>
            <p style="color: #a0a0a0; margin: 0 0 1rem 0; font-size: 0.9rem;">Plus ~1 update/month max. No spam. Unsubscribe anytime.</p>
            <a href="/agentic-sdlc-handbook/download.html" style="display: inline-block; background: #0d6efd; color: white; padding: 0.5rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 500;">Download the Handbook</a>
          </div>
          <div style="text-align: center; margin-top: 1.5rem; padding: 0.75rem; font-size: 0.85rem; color: #888;">
            <p style="margin: 0;">
              <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" style="display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                <img src="data:image/png;base64," alt="CC BY-NC-ND 4.0" style="height: 20px; vertical-align: middle;" />
              </a>
              © 2025-2026 Daniel Meppiel · <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" style="color: #aaa;">CC BY-NC-ND 4.0</a>
            </p>
            <p style="margin: 0.25rem 0 0 0;">Free to read and share with attribution. <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" style="color: #aaa;">License details</a></p>
          </div>
    theme:
      light: cosmo
      dark: darkly
    toc: true
    number-sections: true
    code-copy: true
    search: true
  pdf:
    mermaid:
      theme: neutral
    documentclass: scrreprt
    classoption:
      - open=any
    papersize: a4
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    geometry:
      - top=30mm
      - left=25mm
      - right=25mm
      - bottom=30mm
    code-overflow: wrap
    fig-width: 5.5
    fig-height: 4
    include-in-header: preamble.tex
  epub:
    epub-cover-image: assets/cover/agentic-sdlc-handbook-cover.png
    epub-metadata: epub-metadata.xml
    toc: true
    number-sections: true
