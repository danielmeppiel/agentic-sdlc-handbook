project:
  type: book
  output-dir: _book

book:
  title: "The Agentic SDLC Handbook"
  subtitle: "A Guide to AI-Native Software Development for Leaders and Practitioners"
  author: "Daniel Meppiel"
  date: today
  date-format: "MMMM YYYY"
  site-url: "https://danielmeppiel.github.io/apm-handbook/"
  repo-url: "https://github.com/danielmeppiel/apm-handbook"
  repo-actions: [issue]
  sharing: [twitter, linkedin]
  reader-mode: true
  chapters:
    - index.qmd
    - download.qmd
    - part: "Part I: The Foundation"
      chapters:
        - handbook/ch01-the-agentic-sdlc-thesis.qmd
    - part: "Part II: For Leaders"
      chapters:
        - handbook/ch02-the-ai-native-landscape.qmd
        - handbook/ch03-the-business-case.qmd
        - handbook/ch04-the-reference-architecture.qmd
        - handbook/ch05-governance-for-ai-assisted-delivery.qmd
        - handbook/ch06-team-structures.qmd
        - handbook/ch07-planning-the-transition.qmd
    - part: "Part III: For Practitioners"
      chapters:
        - handbook/ch08-the-practitioners-mindset.qmd
        - handbook/ch09-the-instrumented-codebase.qmd
        - handbook/ch10-the-prose-specification.qmd
        - handbook/ch11-context-engineering.qmd
        - handbook/ch12-multi-agent-orchestration.qmd
        - handbook/ch13-the-execution-meta-process.qmd
        - handbook/ch14-anti-patterns-and-failure-modes.qmd
    - part: "Closing"
      chapters:
        - handbook/ch15-what-comes-next.qmd

format:
  html:
    include-in-header:
      - text: |
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-2DPKEV68VR"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-2DPKEV68VR');
          </script>
    include-after-body:
      - text: |
          <div style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 2rem; margin-top: 3rem; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
            <p style="color: #e0e0e0; margin: 0 0 0.5rem 0; font-size: 1.1rem; font-weight: 600;">📕 Get the PDF &amp; EPUB — free download</p>
            <p style="color: #a0a0a0; margin: 0 0 1rem 0; font-size: 0.9rem;">Plus ~1 update/month max. No spam. Unsubscribe anytime.</p>
            <a href="download.html" style="display: inline-block; background: #0d6efd; color: white; padding: 0.5rem 1.5rem; border-radius: 6px; text-decoration: none; font-weight: 500;">Download the Handbook</a>
          </div>
    theme:
      light: cosmo
      dark: darkly
    toc: true
    number-sections: true
    code-copy: true
    search: true
  pdf:
    documentclass: scrreprt
    papersize: a4
    toc: true
    number-sections: true
    colorlinks: true
    geometry:
      - top=30mm
      - left=25mm
      - right=25mm
      - bottom=30mm
    code-overflow: wrap
    fig-width: 5.5
    fig-height: 4
    include-in-header: preamble.tex
  epub:
    toc: true
    number-sections: true
